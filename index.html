          var prefixes = ['/fi','/de','/ja','/es','/br','/cn','/kr','/fr','/it','/nl','/sv'];

          var target = null;
          if (stored) {
            var k = stored.toLowerCase();
            if (map[k]) target = '/' + map[k];
            else if (k === 'en') return; // explicit EN choice — stay
          }
          if (!target) {
            var langs = navigator.languages || [navigator.language || 'en'];

              if (l.indexOf('nl') === 0) { target = '/nl'; break; }
              if (l.indexOf('sv') === 0) { target = '/sv'; break; }
